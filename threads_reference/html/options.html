<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options</title>
    <link rel="stylesheet" href="/css/options.css">
</head>
<body>
    <main class="options-page">
        <p class="options-text">This setting controls the display of promotional content.</p>

        <label class="options-checkbox">
            <input type="checkbox" name="show-promotional-content">
            <span>Show promotional content</span>
        </label>

        <div class="options-actions">
            <button type="button" class="options-save-btn">Save changes</button>
        </div>
    </main>

    <script src="/js/options.js"></script>
</body>
</html>
